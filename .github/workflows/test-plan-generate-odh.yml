name: Test Plan Generate (odh-test-gen)

on:
  issue_comment:
    types: [created]

jobs:
  resolve-pr:
    if: >-
      github.event_name == 'issue_comment'
      && github.event.issue.pull_request
      && contains(github.event.comment.body, '/test-plan-create-odh')
      && contains(fromJSON('["MEMBER","COLLABORATOR","OWNER"]'),
                  github.event.comment.author_association)
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    outputs:
      pr_number: ${{ steps.resolve.outputs.pr_number }}
      head_sha: ${{ steps.resolve.outputs.head_sha }}
      ep_slug: ${{ steps.resolve.outputs.ep_slug }}
      jira_key: ${{ steps.resolve.outputs.jira_key }}
    steps:
      - name: Acknowledge comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions \
            -f content=eyes --silent

      - name: Resolve PR context
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_ISSUE_NUMBER: ${{ github.event.issue.number }}
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          PR_JSON=$(gh pr view "$EVENT_ISSUE_NUMBER" --repo "${{ github.repository }}" --json headRefOid,baseRefName,files)
          echo "pr_number=$EVENT_ISSUE_NUMBER" >> "$GITHUB_OUTPUT"
          echo "head_sha=$(echo "$PR_JSON" | jq -r .headRefOid)" >> "$GITHUB_OUTPUT"

          # Extract EP slug from changed files
          EP_SLUG=$(echo "$PR_JSON" | jq -r '[.files[].path | capture("enhancements/(?P<s>[^/]+)/") | .s] | first // empty')
          echo "ep_slug=$EP_SLUG" >> "$GITHUB_OUTPUT"

          # Extract Jira key from comment args (e.g., /test-plan-create-odh OSAC-1123)
          JIRA_KEY=$(echo "$COMMENT_BODY" | grep -oP '/test-plan-create-odh\s+\K\S+' || true)
          echo "jira_key=$JIRA_KEY" >> "$GITHUB_OUTPUT"

  generate:
    needs: resolve-pr
    runs-on: ubuntu-latest
    concurrency:
      group: tp-odh-${{ needs.resolve-pr.outputs.pr_number }}
      cancel-in-progress: true
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: main
          fetch-depth: 0
          path: enhancement-proposals

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: pip install uv

      - name: Clone and install odh-test-gen
        run: |
          git clone --depth 1 https://github.com/opendatahub-io/odh-test-gen.git /opt/odh-test-gen
          cd /opt/odh-test-gen
          uv sync --extra dev

      - name: Install dependencies
        run: pip install -r enhancement-proposals/.github/scripts/requirements.txt

      - name: Clone osac-workspace and bootstrap
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone --depth 1 https://github.com/osac-project/osac-workspace.git /opt/osac-workspace
          cd /opt/osac-workspace
          ./bootstrap.sh --no-fork

      - name: Set up GCP credentials
        run: echo "$GCP_SA_KEY" | base64 -d > /tmp/gcp-sa-key.json
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}

      - name: Prepare workspace
        env:
          EP_SLUG: ${{ needs.resolve-pr.outputs.ep_slug }}
        run: |
          # Create output directory for odh-test-gen
          mkdir -p /opt/test-plans/plans/osac

          # Copy the design doc as ADR input
          EP_DIR="enhancement-proposals/enhancements/$EP_SLUG"
          for f in README.md design.md DESIGN.md; do
            if [ -f "$EP_DIR/$f" ]; then
              cp "$EP_DIR/$f" /opt/design-doc.md
              echo "Copied $EP_DIR/$f as design doc"
              break
            fi
          done

          # Copy PRD if exists
          if [ -f "$EP_DIR/prd.md" ]; then
            cp "$EP_DIR/prd.md" /opt/prd-doc.md
            echo "Copied PRD"
          fi

      - name: Run odh-test-gen
        working-directory: /opt/osac-workspace
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcp-sa-key.json
          ANTHROPIC_VERTEX_PROJECT_ID: ${{ secrets.GCP_PROJECT }}
          CLOUD_ML_REGION: ${{ secrets.GCP_REGION }}
          JIRA_URL: ${{ secrets.JIRA_URL }}
          JIRA_USER: ${{ secrets.JIRA_USER }}
          JIRA_TOKEN: ${{ secrets.JIRA_TOKEN }}
          JIRA_KEY: ${{ needs.resolve-pr.outputs.jira_key }}
          EP_SLUG: ${{ needs.resolve-pr.outputs.ep_slug }}
          CLAUDE_NON_INTERACTIVE: "true"
        run: |
          # Build the prompt for Claude Code CLI
          DESIGN_ARG=""
          if [ -f /opt/design-doc.md ]; then
            DESIGN_ARG="/opt/design-doc.md"
          fi

          SKILL_PATH="/opt/odh-test-gen/skills/test-plan-create/SKILL.md"
          OUTPUT_DIR="/opt/test-plans/plans/osac"

          echo "Running odh-test-gen /test-plan-create"
          echo "  Jira key: $JIRA_KEY"
          echo "  Design doc: $DESIGN_ARG"
          echo "  Output dir: $OUTPUT_DIR"
          echo "  Skill: $SKILL_PATH"

          # Run via agentic-ci (same container as our tool)
          python ${{ github.workspace }}/enhancement-proposals/.github/scripts/tp_odh_runner.py || true

      - name: Create PR with odh-test-gen output
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EP_SLUG: ${{ needs.resolve-pr.outputs.ep_slug }}
          PR_NUMBER: ${{ needs.resolve-pr.outputs.pr_number }}
          EP_REPO: ${{ github.workspace }}/enhancement-proposals
        run: |
          # Find the generated test plan
          OUTPUT_DIR="/opt/test-plans/plans/osac"
          TP_FILE=$(find "$OUTPUT_DIR" -name "TestPlan.md" -type f | head -1)

          if [ -z "$TP_FILE" ]; then
            # Fallback: check workdir
            TP_FILE=$(find /opt/osac-workspace/workdir-* -name "testplan-output.md" -type f 2>/dev/null | head -1)
          fi

          if [ -z "$TP_FILE" ]; then
            echo "No test plan output found — skipping PR creation"
            exit 0
          fi

          echo "Found test plan: $TP_FILE ($(wc -c < "$TP_FILE") bytes)"

          BRANCH="test-plan-odh/$EP_SLUG"
          TARGET="$EP_REPO/enhancements/$EP_SLUG/TestPlan-odh.md"

          cd "$EP_REPO"
          git config user.email "test-plan-bot@osac.openshift.io"
          git config user.name "Test Plan Bot (odh-test-gen)"

          git checkout main 2>/dev/null || git checkout -f HEAD
          git push origin --delete "$BRANCH" 2>/dev/null || true
          git branch -D "$BRANCH" 2>/dev/null || true

          git checkout -b "$BRANCH"
          mkdir -p "$(dirname "$TARGET")"
          cp "$TP_FILE" "$TARGET"
          git add "$TARGET"
          git commit -m "Add test plan for $EP_SLUG (odh-test-gen)"
          git push origin "$BRANCH"

          gh pr create --repo "${{ github.repository }}" \
            --head "$BRANCH" --base main \
            --title "Test Plan (odh-test-gen): $EP_SLUG" \
            --body "Test plan generated by opendatahub-io/odh-test-gen for comparison with our /test-plan-create output.

          EP: enhancements/$EP_SLUG/
          Source PR: #$PR_NUMBER

          Compare with the test plan from our tool to evaluate quality differences."

          echo "PR created on branch $BRANCH"

      - name: Upload OTEL metrics
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v4
        with:
          name: tp-odh-pr${{ needs.resolve-pr.outputs.pr_number }}-run${{ github.run_id }}
          path: |
            /opt/osac-workspace/workdir-*/_run/claude-otel.jsonl
            /opt/test-plans/**/*.md
          retention-days: 90
          if-no-files-found: ignore
