name: Test Plan Generate

on:
  pull_request_target:
    types: [closed]
    paths:
      - '**/design.md'
      - '**/DESIGN.md'
      - '**/Design.md'
      - 'enhancements/**/README.md'

  issue_comment:
    types: [created]

jobs:
  resolve-pr:
    if: >-
      (github.event_name == 'pull_request_target'
       && github.event.pull_request.merged == true)
      || (github.event_name == 'issue_comment'
          && github.event.issue.pull_request
          && contains(github.event.comment.body, '/test-plan-create')
          && contains(fromJSON('["MEMBER","COLLABORATOR","OWNER"]'),
                      github.event.comment.author_association))
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    outputs:
      pr_number: ${{ steps.resolve.outputs.pr_number }}
      head_sha: ${{ steps.resolve.outputs.head_sha }}
      base_ref: ${{ steps.resolve.outputs.base_ref }}
    steps:
      - name: Validate slash command
        if: github.event_name == 'issue_comment'
        id: validate
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          if echo "$COMMENT_BODY" | grep -qP '(?m)^\s*/test-plan-create'; then
            echo "valid=true" >> "$GITHUB_OUTPUT"
          else
            echo "::error::Comment contains '/test-plan-create' but not as a line-starting command"
            exit 1
          fi

      - name: Acknowledge comment
        if: github.event_name == 'issue_comment'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions \
            -f content=eyes --silent

      - name: Resolve PR context
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_PR_NUMBER: ${{ github.event.pull_request.number }}
          EVENT_PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          EVENT_PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
          EVENT_ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          if [[ "${{ github.event_name }}" == "pull_request_target" ]]; then
            echo "pr_number=$EVENT_PR_NUMBER" >> "$GITHUB_OUTPUT"
            echo "head_sha=$EVENT_PR_HEAD_SHA" >> "$GITHUB_OUTPUT"
            echo "base_ref=$EVENT_PR_BASE_REF" >> "$GITHUB_OUTPUT"

          elif [[ "${{ github.event_name }}" == "issue_comment" ]]; then
            PR_JSON=$(gh pr view "$EVENT_ISSUE_NUMBER" --repo "${{ github.repository }}" --json headRefOid,baseRefName)
            echo "pr_number=$EVENT_ISSUE_NUMBER" >> "$GITHUB_OUTPUT"
            echo "head_sha=$(echo "$PR_JSON" | jq -r .headRefOid)" >> "$GITHUB_OUTPUT"
            echo "base_ref=$(echo "$PR_JSON" | jq -r .baseRefName)" >> "$GITHUB_OUTPUT"
          fi

  generate:
    needs: resolve-pr
    runs-on: ubuntu-latest
    concurrency:
      group: tp-generate-${{ needs.resolve-pr.outputs.pr_number }}
      cancel-in-progress: true
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: ${{ needs.resolve-pr.outputs.base_ref }}
          fetch-depth: 0
          path: enhancement-proposals

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r enhancement-proposals/.github/scripts/requirements.txt

      - name: Clone osac-workspace and bootstrap
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone --depth 1 https://github.com/osac-project/osac-workspace.git /opt/osac-workspace
          cd /opt/osac-workspace
          ./bootstrap.sh --no-fork

      - name: Clone test plan skills
        run: git clone --depth 1 https://github.com/ItzikEzra-rh/osac-test-plan /opt/osac-workspace/osac-test-plan

      - name: Set up GCP credentials
        run: echo "$GCP_SA_KEY" | base64 -d > /tmp/gcp-sa-key.json
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}

      - name: Run test plan generation
        working-directory: /opt/osac-workspace
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcp-sa-key.json
          ANTHROPIC_VERTEX_PROJECT_ID: ${{ secrets.GCP_PROJECT }}
          CLOUD_ML_REGION: ${{ secrets.GCP_REGION }}
          TP_SHADOW: ${{ vars.TP_SHADOW || 'true' }}
          PR_NUMBER: ${{ needs.resolve-pr.outputs.pr_number }}
          PR_HEAD_SHA: ${{ needs.resolve-pr.outputs.head_sha }}
          EP_REPO_PATH: ${{ github.workspace }}/enhancement-proposals
          WORKSPACE_PATH: /opt/osac-workspace
          SKILLS_PATH: /opt/osac-workspace/osac-test-plan
        run: python ${{ github.workspace }}/enhancement-proposals/.github/scripts/tp_generate.py || true

      - name: Create test plan PR
        if: ${{ vars.TP_SHADOW != 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EP_REPO: ${{ github.workspace }}/enhancement-proposals
        run: |
          WORK_DIR="/opt/osac-workspace/workdir-test-plan-create"
          OUTPUT="$WORK_DIR/testplan-output.md"
          if [ ! -f "$OUTPUT" ]; then
            echo "No testplan-output.md found — skipping PR creation"
            exit 0
          fi

          # Detect EP slug from the script output (written during generation)
          EP_SLUG_FILE="$WORK_DIR/ep-slug.txt"
          if [ -f "$EP_SLUG_FILE" ]; then
            EP_SLUG=$(cat "$EP_SLUG_FILE")
          else
            # Fallback: detect from PR changed files
            EP_SLUG=$(gh api repos/${{ github.repository }}/pulls/${{ needs.resolve-pr.outputs.pr_number }}/files \
              --jq '[.[].filename | select(startswith("enhancements/")) | split("/")[1]] | first // empty')
          fi
          if [ -z "$EP_SLUG" ]; then
            echo "Could not detect EP slug"
            exit 1
          fi

          BRANCH="test-plan/$EP_SLUG"
          TARGET="$EP_REPO/enhancements/$EP_SLUG/TestPlan.md"
          echo "EP slug: $EP_SLUG"
          echo "Output: $(wc -c < "$OUTPUT") bytes"

          cd "$EP_REPO"
          git config user.email "test-plan-bot@osac.openshift.io"
          git config user.name "Test Plan Bot"

          # Ensure we're on main before branch operations
          git checkout main 2>/dev/null || git checkout -f HEAD
          git push origin --delete "$BRANCH" 2>/dev/null || true
          git branch -D "$BRANCH" 2>/dev/null || true

          git checkout -b "$BRANCH"
          mkdir -p "$(dirname "$TARGET")"
          cp "$OUTPUT" "$TARGET"
          git add "$TARGET"
          git commit -m "Add test plan for $EP_SLUG"
          git push origin "$BRANCH"

          gh pr create --repo "${{ github.repository }}" \
            --head "$BRANCH" --base main \
            --title "Test Plan: $EP_SLUG" \
            --body "Auto-generated test plan for enhancements/$EP_SLUG/. Review and comment. Type /test-plan-respond to trigger AI revision."

          echo "PR created on branch $BRANCH"

      - name: Upload OTEL metrics
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v4
        with:
          name: tp-generate-pr${{ needs.resolve-pr.outputs.pr_number }}-run${{ github.run_id }}
          path: /opt/osac-workspace/workdir-*/_run/claude-otel.jsonl
          retention-days: 90
          if-no-files-found: ignore
