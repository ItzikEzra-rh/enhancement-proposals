name: EP Review

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
    paths:
      - 'enhancements/**/*.md'

concurrency:
  group: ep-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    if: >-
      github.event.pull_request.author_association == 'MEMBER' ||
      github.event.pull_request.author_association == 'COLLABORATOR' ||
      github.event.pull_request.author_association == 'OWNER'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          persist-credentials: false

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          repository: osac-project/osac-workspace
          path: .osac-workspace
          persist-credentials: false
          sparse-checkout: |
            skills/ep-review/SKILL.md

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.13"

      - run: pip install --quiet 'anthropic[vertex]==0.52.0'

      - uses: google-github-actions/auth@ba79af03b8d7f2e92b05e4dbc41e536528e46e57 # v2.1.10
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Fetch PR diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          gh pr diff "$PR_NUMBER" --repo "$REPO" > /tmp/pr-diff.txt
          gh pr view "$PR_NUMBER" --repo "$REPO" --json title,body,author,files > /tmp/pr-meta.json

      - name: Run AI EP Review
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          GCP_PROJECT: ${{ secrets.GCP_PROJECT }}
          GCP_REGION: ${{ secrets.GCP_REGION }}
          PR_DIFF_FILE: /tmp/pr-diff.txt
          PR_META_FILE: /tmp/pr-meta.json
        run: python .github/scripts/ep_review.py
